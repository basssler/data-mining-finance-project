panel:
  path: data/interim/event_panel_v2_quarterly_feature_design.parquet
  name: quarterly_tuned_model_upgrade_v1

prices:
  path: data/interim/prices/prices_with_labels.parquet

label:
  path: outputs/quarterly/labels/checkpoint_21d_excess_thresholded.parquet
  variant_name: event_v2_21d_excess_threshold
  horizon_days: 21
  mode: sign
  benchmark_mode: sector_equal_weight_ex_self

holdout:
  start: "2024-01-01"

cv:
  n_splits: 5
  embargo_days: 5
  min_train_dates: 252

scoring:
  threshold: 0.5

models:
  - logistic_regression
  - random_forest
  - hist_gradient_boosting
  - xgboost
  - lightgbm
  - catboost

feature_inclusions:
  additional:
    - av_latest_prior_eps_surprise_before_event
    - av_latest_prior_eps_surprise_pct_before_event
    - av_trailing_4q_eps_surprise_mean
    - av_trailing_4q_eps_surprise_std
    - av_trailing_4q_eps_surprise_pct_mean
    - av_trailing_4q_eps_surprise_pct_std
    - av_trailing_4q_eps_beat_rate
    - av_days_since_last_earnings_release
    - av_latest_quarterly_eps_estimate_before_event
    - av_latest_quarterly_revenue_estimate_before_event
    - av_eps_estimate_analyst_count_before_event
    - av_revenue_estimate_analyst_count_before_event
    - av_eps_estimate_revision_30d
    - av_eps_estimate_revision_90d
    - qfd_delta_operating_margin
    - qfd_delta_net_margin
    - qfd_delta_roa
    - qfd_delta_asset_turnover
    - qfd_delta_revenue_growth_qoq
    - qfd_delta_earnings_growth_qoq
    - qfd_delta_accruals_ratio
    - qfd_delta_liquidity_profile_score
    - qfd_delta_solvency_profile_score
    - qfd_delta_profitability_profile_score
    - qfd_delta_growth_quality_profile_score
    - qfd_delta_overall_financial_health_score
    - qfd_margin_delta_combo
    - qfd_growth_delta_combo
    - qfd_profile_delta_combo
    - qfd_av_surprise_consistency
    - qfd_av_surprise_pct_consistency
    - qfd_av_latest_surprise_vs_trailing_pct
    - qfd_av_revision_pressure
    - qfd_av_revision_acceleration
    - qfd_av_revision_breadth_pressure
    - qfd_av_estimate_breadth_mean
    - qfd_av_revision_x_surprise
    - qfd_av_revision_x_growth_quality
    - qfd_av_surprise_x_financial_health
    - qfd_log_days_since_last_earnings_release
    - qfd_log_days_since_prior_event
    - qfd_log_days_since_prior_same_event_type
    - qfd_event_gap_ratio
    - qfd_event_gap_difference
    - qfd_short_cycle_flag
    - qfd_short_same_type_cycle_flag
    - qfd_es_filing_sentiment_score
    - qfd_es_filing_positive_prob
    - qfd_es_filing_negative_prob
    - qfd_es_filing_neutral_prob
    - qfd_es_filing_sentiment_abs
    - qfd_es_filing_sentiment_delta_prev_q
    - qfd_es_filing_positive_prob_delta_prev_q
    - qfd_es_filing_negative_prob_delta_prev_q
    - qfd_es_negative_tone_jump
    - qfd_es_negative_surprise_vs_90d
    - qfd_es_sentiment_surprise_vs_90d
    - qfd_es_sentiment_uncertainty
    - qfd_es_sentiment_entropy
    - qfd_es_sentiment_polarity_balance
    - qfd_es_source_count
    - qfd_es_text_chunk_count
    - qfd_es_log_text_chunk_count

feature_exclusions:
  explicit:
    - gross_margin
    - current_filing_sentiment_available
    - rel_return_5d
    - rel_return_10d
    - rel_return_21d
    - realized_vol_21d
    - realized_vol_63d
    - vol_ratio_21d_63d
    - beta_63d_to_sector
    - overnight_gap_1d
    - abs_return_shock_1d
    - drawdown_21d
    - return_zscore_21d
    - volume_ratio_20d
    - log_volume
    - abnormal_volume_flag
    - qfd_mkt_pre_event_return_5d
    - qfd_mkt_pre_event_return_21d
    - qfd_mkt_pre_event_excess_return_5d_sector
    - qfd_mkt_pre_event_excess_return_21d_sector
    - qfd_mkt_pre_event_excess_return_5d_market
    - qfd_mkt_pre_event_excess_return_21d_market
    - qfd_mkt_pre_event_volume_z_20d
    - qfd_mkt_pre_event_vol_5d
    - qfd_mkt_pre_event_vol_21d
    - qfd_mkt_pre_event_vol_ratio_5_21
    - qfd_mkt_first_tradable_gap
    - qfd_mkt_first_tradable_abnormal_volume
    - sec_sentiment_score
    - sec_positive_prob
    - sec_negative_prob
    - sec_neutral_prob
    - sec_sentiment_abs
    - sec_sentiment_change_prev
    - sec_positive_change_prev
    - sec_negative_change_prev
    - sec_chunk_count
    - sec_log_chunk_count
  auto_drop_all_missing: true
  auto_drop_constant: true
  max_missingness_pct: 20.0

xgboost:
  prefer_gpu_if_clean: true
  fallback_to_cpu: true
  n_estimators: 300
  max_depth: 4
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 5
  reg_lambda: 1.0

lightgbm:
  n_estimators: 300
  num_leaves: 31
  learning_rate: 0.05
  feature_fraction: 0.8
  bagging_fraction: 0.8
  min_child_samples: 20

catboost:
  iterations: 300
  depth: 6
  learning_rate: 0.05
  l2_leaf_reg: 3.0
  random_strength: 1.0
  bagging_temperature: 1.0

tuning:
  enabled: true
  n_trials: 20
  objective:
    metric: mean_cv_auc
    stability_penalty: 0.25
    concentration_penalty: 0.05
  models:
    xgboost:
      n_trials: 24
    lightgbm:
      n_trials: 24
    catboost:
      n_trials: 24
  reproducibility:
    seeds: [42, 52, 62]
    max_holdout_auc_std: 0.015
    max_cv_auc_std: 0.015

random_seed:
  python: 42
  numpy: 42
  sklearn: 42
  xgboost: 42
  lightgbm: 42
  catboost: 42

promotion:
  strategy: stability_aware
  reference_results_csv: reports/results/quarterly_phase9_event_specific_sentiment_champion_benchmark.csv
  min_holdout_auc_delta: 0.0

metadata:
  report_title: "Quarterly Tuned Model Upgrade"
  label_description: "21-trading-day thresholded excess return (+/-1.5%)"
  panel_display_name: "quarterly_tuned_model_upgrade_v1"
  setup_note: "Baseline keepers stay in the matrix while XGBoost, LightGBM, and CatBoost are tuned under the same purged quarterly evaluation policy."
  interpretation_note: "Promote only if the tuned winner improves on the current quarterly champion without sacrificing worst-fold behavior or reproducibility."
  experiment_family: "quarterly_model_upgrade"
  design_note: "baseline_keepers_plus_tuned_boosted_trees"

outputs:
  csv: reports/results/quarterly_tuned_model_upgrade_benchmark.csv
  markdown: reports/results/quarterly_tuned_model_upgrade_benchmark.md
  shap_plot: reports/results/quarterly_tuned_model_upgrade_shap_summary.png
  shap_csv: reports/results/quarterly_tuned_model_upgrade_shap_importance.csv
  concentration_csv: reports/results/quarterly_tuned_model_upgrade_concentration.csv
  tuning_dir: outputs/quarterly/models/quarterly_tuned_model_upgrade_v1
  validation_dir: outputs/quarterly/validation/quarterly_tuned_model_upgrade_v1
